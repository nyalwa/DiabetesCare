<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Diabetes Detection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="login-page">
        <div class="login-card card">

            <!-- Header -->
            <div class="login-header">
                <i class="bi bi-shield-lock-fill"></i>
                <h4 class="fw-bold mb-1 mt-2">
                    Admin Portal
                </h4>
                <p class="opacity-75 small mb-0">
                    Diabetes Detection System
                </p>
            </div>

            <!-- Form -->
            <div class="card-body p-4">

                {% if error %}
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">

                    <!-- Username -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-person-badge-fill me-1 text-primary"></i>
                            Username
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <input type="text" name="username" class="form-control" placeholder="Enter username"
                                required autofocus>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-lock-fill me-1 text-primary"></i>
                            Password
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" name="password" class="form-control" placeholder="Enter password"
                                required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            Login to Admin Panel
                        </button>
                    </div>

                </form>



                <!-- Back Link -->
                <div class="text-center mt-3 d-flex flex-column gap-2">
                    <a href="{{ url_for('doctor_login') }}" class="text-primary small fw-bold text-decoration-none">
                        <i class="bi bi-person-heart me-1"></i>
                        Are you a Doctor? Login here
                    </a>
                    <a href="{{ url_for('index') }}" class="text-muted small">
                        <i class="bi bi-arrow-left me-1"></i>
                        Back to main site
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
