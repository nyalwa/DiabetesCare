{% extends 'admin/base_admin.html' %}
{% block title %}Add Doctor{% endblock %}
{% block page_title %}Add New Doctor{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header bg-light fw-bold">
                <i class="bi bi-person-plus-fill
                          me-2 text-primary"></i>
                New Doctor Registration
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label">
                                <i class="bi bi-person-fill me-1 text-primary"></i>
                                Full Name *
                            </label>
                            <input type="text" name="full_name" class="form-control" placeholder="e.g. Dr. John Smith"
                                required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="bi bi-person-badge-fill me-1 text-primary"></i>
                                Specialization *
                            </label>
                            <select name="specialization" class="form-select" required>
                                <option value="">
                                    Select specialization
                                </option>
                                <option value="Endocrinologist">
                                    Endocrinologist
                                </option>
                                <option value="General Practitioner">
                                    General Practitioner
                                </option>
                                <option value="Nutritionist">
                                    Nutritionist
                                </option>
                                <option value="Diabetologist">
                                    Diabetologist
                                </option>
                                <option value="Cardiologist">
                                    Cardiologist
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="bi bi-award-fill me-1 text-warning"></i>
                                Years of Experience *
                            </label>
                            <input type="number" name="experience_years" class="form-control" min="1" max="50"
                                placeholder="e.g. 10" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label">
                                <i class="bi bi-hospital-fill me-1 text-primary"></i>
                                Hospital / Clinic *
                            </label>
                            <input type="text" name="hospital" class="form-control"
                                placeholder="e.g. Mulago National Referral Hospital" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="bi bi-telephone-fill me-1 text-success"></i>
                                Phone *
                            </label>
                            <input type="text" name="phone" class="form-control" placeholder="e.g. +256700000000"
                                required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="bi bi-envelope-fill me-1 text-primary"></i>
                                Email *
                            </label>
                            <input type="email" name="email" class="form-control" placeholder="e.g. doctor@hospital.com"
                                required>
                        </div>

                        <div class="col-12">
                            <label class="form-label">
                                <i class="bi bi-file-text-fill me-1 text-muted"></i>
                                Professional Bio
                            </label>
                            <textarea name="bio" class="form-control" rows="3"
                                placeholder="Brief professional biography..."></textarea>
                        </div>

                        <!-- Login Password -->
                        <div class="col-12">
                            <hr>
                            <label class="form-label fw-bold">
                                <i class="bi bi-lock-fill me-1 text-primary"></i>
                                Set Login Password for Doctor *
                            </label>
                            <input type="password" name="password" class="form-control" placeholder="Create a password for this doctor"
                                required>
                            <div class="form-text">
                                <strong>Login Username:</strong> The email provided above will be used as their username.
                            </div>
                        </div>

                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            Add Doctor
                        </button>
                        <a href="{{ url_for('admin_doctors') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle me-1"></i>
                            Cancelp
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
