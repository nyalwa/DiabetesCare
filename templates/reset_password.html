{% extends 'base.html' %}
{% block title %}Reset Password — Diabetes Detection System{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">

            <!-- Header -->
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-success" style="font-size:3rem"></i>
                <h2 class="fw-bold mt-2">
                    Set New Password
                </h2>
                <p class="text-muted">
                    Account found for
                    <strong>{{ email }}</strong>
                </p>
            </div>

            <div class="card">
                <div class="card-header bg-success text-white">
                    <i class="bi bi-lock-fill me-2"></i>
                    Create New Password
                </div>
                <div class="card-body p-4">

                    {% if error %}
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">

                        <!-- New Password -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-lock-fill me-1 text-primary"></i>
                                New Password *
                            </label>
                            <div class="input-group">
                                <input type="password" name="new_password" id="new_password" class="form-control"
                                    placeholder="Minimum 6 characters" minlength="6" required autofocus>
                                <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePass('new_password', this)">
                                    <i class="bi bi-eye-fill"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-lock-fill me-1 text-primary"></i>
                                Confirm New Password *
                            </label>
                            <div class="input-group">
                                <input type="password" name="confirm_password" id="confirm_password"
                                    class="form-control" placeholder="Repeat new password" required>
                                <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePass('confirm_password', this)">
                                    <i class="bi bi-eye-fill"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="bi bi-check-circle-fill me-2"></i>
                                Reset My Password
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function togglePass(fieldId, button) {
        const field = document.getElementById(fieldId);
        const icon = button.querySelector('i');
        if (field.type === 'password') {
            field.type = 'text';
            icon.className = 'bi bi-eye-slash-fill';
        } else {
            field.type = 'password';
            icon.className = 'bi bi-eye-fill';
        }
    }

    // Password match check
    const newPass = document.getElementById('new_password');
    const confirm = document.getElementById('confirm_password');
    confirm.addEventListener('input', function () {
        if (this.value !== newPass.value) {
            this.setCustomValidity('Passwords do not match!');
            this.style.borderColor = '#e74c3c';
        } else {
            this.setCustomValidity('');
            this.style.borderColor = '#27ae60';
        }
    });
</script>
{% endblock %}
